<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎹 L'Odyssée des Notes Magiques</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎹</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep:    #07091f;
      --bg-mid:     #11154a;
      --accent:     #FFD166;
      --accent-2:   #EF476F;
      --text:       #FFFFFF;
      --text-soft:  rgba(220,228,255,0.78);
      --text-mute:  rgba(180,190,230,0.55);
      --surface:    rgba(18,22,55,0.78);
      --border:     rgba(255,255,255,0.10);
      --shadow-sm:  0 2px 8px rgba(0,0,0,0.30);
      --shadow-md:  0 10px 28px rgba(0,0,0,0.40);
      --shadow-lg:  0 24px 60px rgba(0,0,0,0.55);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-deep);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Fredoka', 'Quicksand', system-ui, -apple-system, sans-serif;
      font-weight: 500;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: 0.2px;
    }

    #gameCanvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
    }

    /* Piano keyboard overlay */
    #piano-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: none;
      justify-content: center;
      align-items: flex-end;
      padding: 12px 12px 0;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0) 100%);
      gap: 7px;
      z-index: 10;
    }

    .piano-key {
      width: 78px;
      height: 132px;
      border-radius: 0 0 14px 14px;
      border: 1px solid rgba(255,255,255,0.20);
      border-top: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 14px;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
      transition: transform 0.12s ease-out, filter 0.12s, box-shadow 0.15s;
      position: relative;
      box-shadow:
        0 6px 0 rgba(0,0,0,0.25),
        0 10px 22px rgba(0,0,0,0.35),
        inset 0 2px 0 rgba(255,255,255,0.28),
        inset 0 -10px 16px rgba(0,0,0,0.18);
    }

    .piano-key:hover {
      filter: brightness(1.12);
      transform: translateY(-2px);
    }
    .piano-key.pressed, .piano-key:active {
      transform: translateY(5px) scaleY(0.97);
      filter: brightness(1.35);
      box-shadow:
        0 1px 0 rgba(0,0,0,0.20),
        0 3px 8px rgba(0,0,0,0.30),
        inset 0 2px 0 rgba(255,255,255,0.40),
        inset 0 -4px 10px rgba(0,0,0,0.10);
    }

    .key-note-name {
      font-size: 21px;
      line-height: 1;
      letter-spacing: 0.5px;
      font-weight: 700;
    }
    .key-shortcut {
      font-size: 11px;
      opacity: 0.65;
      margin-top: 6px;
      background: rgba(0,0,0,0.32);
      padding: 2px 7px;
      border-radius: 6px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* HUD overlay */
    #hud {
      position: absolute;
      top: 14px; left: 0; right: 0;
      display: none;
      justify-content: space-between;
      align-items: center;
      padding: 0 22px;
      z-index: 10;
      pointer-events: none;
      gap: 14px;
    }

    #hud-score, #hud-level, #hud-lives {
      background: rgba(15,18,45,0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      padding: 8px 18px;
      box-shadow: var(--shadow-sm);
    }

    #hud-score {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 14px rgba(255,209,102,0.45);
    }

    #hud-level {
      font-size: 16px;
      font-weight: 600;
      color: white;
      letter-spacing: 0.3px;
    }

    #hud-lives {
      font-size: 22px;
      letter-spacing: 3px;
    }

    /* Message overlay */
    #message-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(15,18,45,0.85);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 22px;
      padding: 26px 50px;
      text-align: center;
      color: white;
      font-size: 26px;
      font-weight: 600;
      display: none;
      z-index: 20;
      animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow-lg);
    }

    @keyframes popIn {
      from { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
      to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
    }

    /* Particle effect */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 15;
    }

    /* Instruction popup */
    #instruction {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background:
        linear-gradient(135deg, rgba(28,32,76,0.95) 0%, rgba(40,28,90,0.95) 100%);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 26px;
      padding: 42px 56px;
      text-align: center;
      color: white;
      max-width: 600px;
      width: 90%;
      display: none;
      z-index: 30;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    #instruction h2 {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 18px;
      letter-spacing: 0.3px;
      text-shadow: 0 0 24px rgba(255,209,102,0.40);
    }

    #instruction p {
      font-size: 18px;
      line-height: 1.6;
      color: var(--text-soft);
      margin-bottom: 28px;
      font-weight: 400;
    }

    #instruction .start-btn {
      background: linear-gradient(135deg, #FFD166 0%, #EF476F 100%);
      color: #1a0a2e;
      border: none;
      padding: 14px 38px;
      font-size: 19px;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.3px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s ease-out, box-shadow 0.15s, filter 0.15s;
      box-shadow: 0 6px 22px rgba(255,209,102,0.35), 0 2px 6px rgba(0,0,0,0.3);
    }

    #instruction .start-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 10px 30px rgba(255,209,102,0.50), 0 4px 10px rgba(0,0,0,0.35);
    }
    #instruction .start-btn:active { transform: translateY(0); }

    /* Back to menu button */
    #btn-back {
      position: absolute;
      top: 56px; left: 22px;
      background: rgba(15,18,45,0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.88);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
      display: none;
      z-index: 25;
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
      box-shadow: var(--shadow-sm);
    }
    #btn-back:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.30);
      transform: translateY(-1px);
    }
    #btn-back:active { transform: translateY(0); }

    /* Progress bar for level 3 */
    #progress-bar-container {
      position: absolute;
      bottom: 158px; left: 5%; right: 5%;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 999px;
      display: none;
      z-index: 10;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }

    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #FFD166 0%, #EF476F 100%);
      border-radius: 999px;
      transition: width 0.4s ease-out;
      width: 0%;
      box-shadow: 0 0 12px rgba(255,209,102,0.6);
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- Piano keyboard -->
<div id="piano-bar"></div>

<!-- HUD -->
<div id="hud">
  <div id="hud-score">⭐ 0</div>
  <div id="hud-level">Niveau 1</div>
  <div id="hud-lives">❤️❤️❤️</div>
</div>

<!-- Message overlay -->
<div id="message-overlay"></div>

<!-- Instructions popup -->
<div id="instruction">
  <h2 id="instr-title"></h2>
  <p id="instr-text"></p>
  <button class="start-btn" id="instr-btn">Allons-y ! 🎵</button>
</div>

<!-- Back to menu button -->
<button id="btn-back">⬅ Menu</button>

<!-- Progress bar (level 3) -->
<div id="progress-bar-container">
  <div id="progress-bar"></div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const NOTES = [
  { id: 0, name: 'DO',  key: 'a', color: '#FF4444', glow: '#FF000080', freq: 261.63 },
  { id: 1, name: 'RÉ',  key: 's', color: '#FF8C00', glow: '#FF8C0080', freq: 293.66 },
  { id: 2, name: 'MI',  key: 'd', color: '#FFD700', glow: '#FFD70080', freq: 329.63 },
  { id: 3, name: 'FA',  key: 'f', color: '#44BB44', glow: '#44BB4480', freq: 349.23 },
  { id: 4, name: 'SOL', key: 'g', color: '#4488FF', glow: '#4488FF80', freq: 392.00 },
  { id: 5, name: 'LA',  key: 'h', color: '#9944CC', glow: '#9944CC80', freq: 440.00 },
  { id: 6, name: 'SI',  key: 'j', color: '#FF69B4', glow: '#FF69B480', freq: 493.88 },
  { id: 7, name: 'DO',  key: 'k', color: '#8B0000', glow: '#8B000080', freq: 523.25 },
];

// "Au Clair de la Lune" (simplified)
const MELODY = [
  // Phrase 1: DO DO DO RÉ MI(long) RÉ(long)
  { noteId: 0, beats: 1 }, { noteId: 0, beats: 1 }, { noteId: 0, beats: 1 },
  { noteId: 1, beats: 1 }, { noteId: 2, beats: 2 }, { noteId: 1, beats: 2 },
  // Phrase 2: DO MI RÉ RÉ DO(très long)
  { noteId: 0, beats: 1 }, { noteId: 2, beats: 1 }, { noteId: 1, beats: 1 },
  { noteId: 1, beats: 1 }, { noteId: 0, beats: 4 },
  // Phrase 3: "Prête-moi ta plume" — SOL SOL SOL SOL FA(long) MI(long)
  { noteId: 4, beats: 1 }, { noteId: 4, beats: 1 }, { noteId: 4, beats: 1 },
  { noteId: 4, beats: 1 }, { noteId: 3, beats: 2 }, { noteId: 2, beats: 2 },
  // Phrase 4: "Pour écrire un mot" — RÉ(long) DO(très long)
  { noteId: 1, beats: 2 }, { noteId: 0, beats: 6 },
];

const BEAT_SPEED = 250; // px/s — vitesse de défilement niveau 3
const BEAT_DUR_L3 = 0.55; // secondes par beat
const BEAT_PX = BEAT_DUR_L3 * BEAT_SPEED; // pixels par beat (137.5) — cohérent avec la vitesse
const HIT_ZONE_X = 180;
const LEAD_TIME = 3.0; // secondes de délai avant la première note

// ============================================================
// CANVAS + AUDIO SETUP
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playNote(freq, duration = 1.2, volume = 0.4) {
  const ac = getAudio();
  const now = ac.currentTime;
  const masterGain = ac.createGain();
  masterGain.connect(ac.destination);

  [1, 2, 3].forEach((harmonic, i) => {
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.type = i === 0 ? 'triangle' : 'sine';
    osc.frequency.setValueAtTime(freq * harmonic, now);
    const vol = volume * [1, 0.4, 0.15][i];
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.01);
    g.gain.exponentialRampToValueAtTime(vol * 0.6, now + 0.15);
    g.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(now);
    osc.stop(now + duration + 0.05);
  });
}

function playSuccess() {
  const ac = getAudio();
  [523.25, 659.25, 783.99].forEach((f, i) => {
    setTimeout(() => playNote(f, 0.5, 0.3), i * 150);
  });
}

// Sustained piano notes (level 3)
const sustainNodes = {};
function startSustainNote(noteId) {
  if (sustainNodes[noteId]) return;
  const ac = getAudio();
  const now = ac.currentTime;
  const freq = NOTES[noteId].freq;
  const masterGain = ac.createGain();
  masterGain.connect(ac.destination);
  masterGain.gain.setValueAtTime(0, now);
  masterGain.gain.linearRampToValueAtTime(0.4, now + 0.015);
  const oscs = [];
  [1, 2, 3].forEach((harmonic, i) => {
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.type = i === 0 ? 'triangle' : 'sine';
    osc.frequency.setValueAtTime(freq * harmonic, now);
    g.gain.setValueAtTime([1, 0.4, 0.15][i], now);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(now);
    oscs.push(osc);
  });
  sustainNodes[noteId] = { masterGain, oscs };
}
function stopSustainNote(noteId) {
  const s = sustainNodes[noteId];
  if (!s) return;
  const ac = getAudio();
  const now = ac.currentTime;
  s.masterGain.gain.cancelScheduledValues(now);
  s.masterGain.gain.setValueAtTime(s.masterGain.gain.value, now);
  s.masterGain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
  s.oscs.forEach(osc => { try { osc.stop(now + 0.4); } catch(e) {} });
  delete sustainNodes[noteId];
}
function stopAllSustainNotes() {
  Object.keys(sustainNodes).forEach(id => stopSustainNote(Number(id)));
}

function playError() {
  const ac = getAudio();
  const now = ac.currentTime;
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(180, now);
  osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
  g.gain.setValueAtTime(0.3, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc.connect(g);
  g.connect(ac.destination);
  osc.start(now);
  osc.stop(now + 0.35);
}

// ============================================================
// GAME STATE
// ============================================================
let gameState = 'menu';
let score = 0;
let lives = 3;
let maxLives = 3;
let stars = [];
let particles = [];
let octaveColor = 0; // 0 = gray, 1 = full color
let octaveX = 80, octaveY = 0;
let octaveVY = 0;
let octaveJumping = false;

// Level 1 state
let bubbles = [];
let l1Score = 0;
let l1BubbleTimer = 0;
let l1BubbleInterval = 1.8;
let l1HighScore = parseInt(localStorage.getItem('l1HighScore') || '0');

// Level 2 state
let platforms = [];
let l2CurrentNote = -1;
let l2Waiting = true;
let l2WaitTimer = 0;
let l2Score = 0;
const L2_TARGET = 10;
let l2OctaveTargetX = 0;
let l2OctaveTargetY = 0;
let l2Celebrating = false;

// Level 3 state
let l3Notes = [];
let l3ScrollX = 0;
let l3NoteQueue = [];
let l3Pointer = 0;
let l3Score = 0;
let l3Done = false;
let l3Started = false;
let l3HitFeedback = null; // { x, y, color, timer }
let activeNoteHighlight = -1;

let lastTime = 0;

// ============================================================
// STARS (background)
// ============================================================
function initStars() {
  stars = Array.from({ length: 180 }, () => ({
    x: Math.random() * 1920,
    y: Math.random() * 1080,
    r: Math.random() * 2 + 0.5,
    alpha: Math.random(),
    speed: Math.random() * 0.5 + 0.2,
  }));
}
initStars();

function drawStars(dt) {
  stars.forEach(s => {
    s.alpha += s.speed * dt;
    const a = (Math.sin(s.alpha) + 1) / 2 * 0.8 + 0.1;
    ctx.beginPath();
    ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  });
}

// ============================================================
// ============================================================
// DRAW ZOMBIE (humanoid, cute)
// ============================================================
function drawOctave(x, y, size, gray = false, hat = false) {
  drawZombie(x, y, size, gray, hat);
}
function drawZombie(x, y, size, gray = false, hat = false) {
  const skin  = gray ? '#8A9A88' : '#88CC66';
  const dark  = gray ? '#4A5A48' : '#4A7A33';
  const shirt = gray ? '#888888' : '#CC4444';
  const pants = gray ? '#666666' : '#5544AA';

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.beginPath();
  ctx.ellipse(0, size * 0.82, size * 0.45, size * 0.1, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // Legs
  ctx.lineCap = 'round';
  [[-0.15, 0.45, -0.18, 0.82], [0.15, 0.45, 0.18, 0.82]].forEach(([x1, y1, x2, y2]) => {
    ctx.beginPath();
    ctx.moveTo(x1 * size, y1 * size);
    ctx.lineTo(x2 * size, y2 * size);
    ctx.strokeStyle = pants;
    ctx.lineWidth = size * 0.18;
    ctx.stroke();
    // shoe
    ctx.beginPath();
    ctx.ellipse(x2 * size, y2 * size + size * 0.04, size * 0.13, size * 0.07, 0, 0, Math.PI * 2);
    ctx.fillStyle = gray ? '#444' : '#222244';
    ctx.fill();
  });

  // Body / shirt
  ctx.beginPath();
  ctx.roundRect(-size * 0.28, -size * 0.12, size * 0.56, size * 0.58, size * 0.12);
  ctx.fillStyle = shirt;
  ctx.fill();
  // Torn shirt bottom
  ctx.beginPath();
  ctx.moveTo(-size * 0.28, size * 0.38);
  ctx.lineTo(-size * 0.20, size * 0.46);
  ctx.lineTo(-size * 0.10, size * 0.40);
  ctx.lineTo( 0,           size * 0.48);
  ctx.lineTo( size * 0.10, size * 0.40);
  ctx.lineTo( size * 0.20, size * 0.46);
  ctx.lineTo( size * 0.28, size * 0.38);
  ctx.fillStyle = shirt;
  ctx.fill();
  // Belly stitch scar
  ctx.strokeStyle = dark;
  ctx.lineWidth = size * 0.022;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-size * 0.10, size * 0.10);
  ctx.lineTo( size * 0.10, size * 0.10);
  ctx.stroke();
  [-0.07, -0.01, 0.05].forEach(sx => {
    ctx.beginPath();
    ctx.moveTo(sx * size, size * 0.06);
    ctx.lineTo(sx * size, size * 0.14);
    ctx.stroke();
  });

  // Left arm (outstretched zombie style)
  ctx.beginPath();
  ctx.moveTo(-size * 0.28, size * 0.04);
  ctx.lineTo(-size * 0.60, -size * 0.08);
  ctx.strokeStyle = skin;
  ctx.lineWidth = size * 0.15;
  ctx.lineCap = 'round';
  ctx.stroke();
  // Left hand
  ctx.beginPath();
  ctx.arc(-size * 0.63, -size * 0.09, size * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = skin;
  ctx.fill();

  // Right arm (dangling)
  ctx.beginPath();
  ctx.moveTo(size * 0.28, size * 0.04);
  ctx.lineTo(size * 0.52, size * 0.22);
  ctx.strokeStyle = skin;
  ctx.lineWidth = size * 0.15;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(size * 0.55, size * 0.24, size * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = skin;
  ctx.fill();

  // Neck
  ctx.beginPath();
  ctx.rect(-size * 0.1, -size * 0.18, size * 0.2, size * 0.1);
  ctx.fillStyle = skin;
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.arc(0, -size * 0.44, size * 0.33, 0, Math.PI * 2);
  ctx.fillStyle = skin;
  ctx.fill();

  // Messy hair
  ctx.fillStyle = gray ? '#555' : '#3A2200';
  [[-0.25, -0.72, -0.12, -0.95, 0,     -0.72],
   [-0.05, -0.75,  0.08, -1.0,  0.18,  -0.73],
   [ 0.15, -0.70,  0.28, -0.92, 0.35,  -0.68]].forEach(([ax, ay, bx, by, cx2, cy]) => {
    ctx.beginPath();
    ctx.moveTo(ax * size, ay * size);
    ctx.lineTo(bx * size, by * size);
    ctx.lineTo(cx2 * size, cy * size);
    ctx.closePath();
    ctx.fill();
  });

  // Forehead stitch
  ctx.strokeStyle = dark;
  ctx.lineWidth = size * 0.022;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-size * 0.10, -size * 0.62);
  ctx.lineTo( size * 0.10, -size * 0.62);
  ctx.stroke();
  [-0.06, 0.02].forEach(sx => {
    ctx.beginPath();
    ctx.moveTo(sx * size, -size * 0.66);
    ctx.lineTo(sx * size, -size * 0.58);
    ctx.stroke();
  });

  // Eyes — X eyes
  ctx.strokeStyle = '#1A1A1A';
  ctx.lineWidth = size * 0.045;
  ctx.lineCap = 'round';
  [-0.13, 0.13].forEach(ex => {
    const ex2 = ex * size, ey = -size * 0.47, r = size * 0.065;
    ctx.beginPath(); ctx.moveTo(ex2 - r, ey - r); ctx.lineTo(ex2 + r, ey + r); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex2 + r, ey - r); ctx.lineTo(ex2 - r, ey + r); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(ex2 + size * 0.04, ey - size * 0.05, size * 0.02, 0, Math.PI * 2);
    ctx.fill();
  });

  // Nose
  ctx.beginPath();
  ctx.arc(0, -size * 0.37, size * 0.038, 0, Math.PI * 2);
  ctx.fillStyle = dark;
  ctx.fill();

  // Mouth — stitched zigzag
  ctx.strokeStyle = dark;
  ctx.lineWidth = size * 0.028;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(-size * 0.14, -size * 0.28);
  ctx.lineTo(-size * 0.07, -size * 0.24);
  ctx.lineTo(0,             -size * 0.28);
  ctx.lineTo( size * 0.07, -size * 0.24);
  ctx.lineTo( size * 0.14, -size * 0.28);
  ctx.stroke();
  ctx.fillStyle = dark;
  [-0.10, -0.03, 0.04, 0.11].forEach(sx => {
    ctx.beginPath();
    ctx.arc(sx * size, -size * 0.26, size * 0.015, 0, Math.PI * 2);
    ctx.fill();
  });

  // Wizard hat
  if (hat) {
    ctx.beginPath();
    ctx.moveTo(-size * 0.38, -size * 0.72);
    ctx.lineTo( size * 0.38, -size * 0.72);
    ctx.lineTo( size * 0.38, -size * 0.78);
    ctx.lineTo(-size * 0.38, -size * 0.78);
    ctx.closePath();
    ctx.fillStyle = '#6644BB';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, -size * 1.35);
    ctx.lineTo(-size * 0.32, -size * 0.78);
    ctx.lineTo( size * 0.32, -size * 0.78);
    ctx.closePath();
    ctx.fillStyle = '#6644BB';
    ctx.fill();
    ['#FFD700','#FF69B4','#4488FF'].forEach((c, i) => {
      drawStar5(ctx, (i - 1) * size * 0.18, -size * (0.9 + i * 0.12), size * 0.06, c);
    });
  }

  ctx.restore();
}

// ============================================================
// DRAW VAMPIRE (humanoid, cute)
// ============================================================
function drawVampire(x, y, size, gray = false, hat = false) {
  const skin  = gray ? '#AAAAAA' : '#F0D8C8';
  const dark  = gray ? '#555555' : '#8B1A1A';
  const cape  = gray ? '#555555' : '#880022';
  const capeI = gray ? '#888888' : '#CC1133';
  const hair  = gray ? '#666666' : '#111111';

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.beginPath();
  ctx.ellipse(0, size * 0.82, size * 0.45, size * 0.1, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // Cape (back layer, wide)
  ctx.beginPath();
  ctx.moveTo(-size * 0.05, -size * 0.12);
  ctx.lineTo(-size * 0.58, size * 0.55);
  ctx.lineTo(-size * 0.30, size * 0.80);
  ctx.lineTo( size * 0.30, size * 0.80);
  ctx.lineTo( size * 0.58, size * 0.55);
  ctx.lineTo( size * 0.05, -size * 0.12);
  ctx.fillStyle = cape;
  ctx.fill();
  // Cape inner lining
  ctx.beginPath();
  ctx.moveTo(-size * 0.04, -size * 0.10);
  ctx.lineTo(-size * 0.44, size * 0.52);
  ctx.lineTo(-size * 0.22, size * 0.78);
  ctx.lineTo( size * 0.22, size * 0.78);
  ctx.lineTo( size * 0.44, size * 0.52);
  ctx.lineTo( size * 0.04, -size * 0.10);
  ctx.fillStyle = capeI;
  ctx.fill();

  // Legs
  [[-0.13, 0.45, -0.15, 0.80], [0.13, 0.45, 0.15, 0.80]].forEach(([x1, y1, x2, y2]) => {
    ctx.beginPath();
    ctx.moveTo(x1 * size, y1 * size);
    ctx.lineTo(x2 * size, y2 * size);
    ctx.strokeStyle = gray ? '#555' : '#111133';
    ctx.lineWidth = size * 0.16;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(x2 * size, y2 * size + size * 0.04, size * 0.12, size * 0.065, 0, 0, Math.PI * 2);
    ctx.fillStyle = gray ? '#444' : '#000022';
    ctx.fill();
  });

  // Body (white shirt under cape)
  ctx.beginPath();
  ctx.roundRect(-size * 0.20, -size * 0.12, size * 0.40, size * 0.58, size * 0.10);
  ctx.fillStyle = gray ? '#AAAAAA' : '#F5F5FF';
  ctx.fill();
  // Bow-tie
  ctx.fillStyle = gray ? '#777' : '#CC0022';
  ctx.beginPath();
  ctx.moveTo(-size * 0.09, -size * 0.14);
  ctx.lineTo( 0,           -size * 0.09);
  ctx.lineTo(-size * 0.09, -size * 0.04);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo( size * 0.09, -size * 0.14);
  ctx.lineTo( 0,           -size * 0.09);
  ctx.lineTo( size * 0.09, -size * 0.04);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, -size * 0.09, size * 0.04, 0, Math.PI * 2);
  ctx.fillStyle = gray ? '#888' : '#FF0033';
  ctx.fill();

  // Neck
  ctx.beginPath();
  ctx.rect(-size * 0.09, -size * 0.18, size * 0.18, size * 0.09);
  ctx.fillStyle = skin;
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.arc(0, -size * 0.44, size * 0.32, 0, Math.PI * 2);
  ctx.fillStyle = skin;
  ctx.fill();

  // Pointy ears
  [[-1, 1]].forEach(() => {
    [-1, 1].forEach(side => {
      ctx.beginPath();
      ctx.moveTo(side * size * 0.28, -size * 0.52);
      ctx.lineTo(side * size * 0.40, -size * 0.72);
      ctx.lineTo(side * size * 0.18, -size * 0.58);
      ctx.closePath();
      ctx.fillStyle = skin;
      ctx.fill();
    });
  });

  // Slicked hair
  ctx.fillStyle = hair;
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.70, size * 0.33, size * 0.12, 0, 0, Math.PI * 2);
  ctx.fill();
  // Hair widow's peak
  ctx.beginPath();
  ctx.moveTo(-size * 0.16, -size * 0.70);
  ctx.lineTo(0,             -size * 0.60);
  ctx.lineTo( size * 0.16, -size * 0.70);
  ctx.closePath();
  ctx.fill();
  // Hair sides
  ctx.beginPath();
  ctx.moveTo(-size * 0.30, -size * 0.66);
  ctx.quadraticCurveTo(-size * 0.38, -size * 0.50, -size * 0.32, -size * 0.44);
  ctx.lineWidth = size * 0.10;
  ctx.strokeStyle = hair;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo( size * 0.30, -size * 0.66);
  ctx.quadraticCurveTo( size * 0.38, -size * 0.50,  size * 0.32, -size * 0.44);
  ctx.stroke();

  // Eyes — big cute eyes with red iris
  [-0.12, 0.12].forEach(ex => {
    const ex2 = ex * size, ey = -size * 0.47;
    // White of eye
    ctx.beginPath();
    ctx.ellipse(ex2, ey, size * 0.08, size * 0.09, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();
    // Red iris
    ctx.beginPath();
    ctx.arc(ex2, ey + size * 0.01, size * 0.05, 0, Math.PI * 2);
    ctx.fillStyle = gray ? '#888' : '#CC0000';
    ctx.fill();
    // Pupil
    ctx.beginPath();
    ctx.arc(ex2, ey + size * 0.01, size * 0.025, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    // Shine
    ctx.beginPath();
    ctx.arc(ex2 + size * 0.03, ey - size * 0.03, size * 0.02, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();
  });

  // Nose (small)
  ctx.beginPath();
  ctx.arc(0, -size * 0.36, size * 0.033, 0, Math.PI * 2);
  ctx.fillStyle = gray ? '#999' : '#D4A0A0';
  ctx.fill();

  // Smile with fangs
  ctx.strokeStyle = dark;
  ctx.lineWidth = size * 0.025;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(0, -size * 0.22, size * 0.13, 0.15, Math.PI - 0.15);
  ctx.stroke();
  // Fangs
  ctx.fillStyle = 'white';
  [[-0.06, 0.06]].forEach(() => {
    [-0.06, 0.06].forEach(fx => {
      ctx.beginPath();
      ctx.moveTo(fx * size - size * 0.025, -size * 0.22);
      ctx.lineTo(fx * size,                -size * 0.30);
      ctx.lineTo(fx * size + size * 0.025, -size * 0.22);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = gray ? '#888' : '#DDBBBB';
      ctx.lineWidth = size * 0.012;
      ctx.stroke();
    });
  });

  // Wizard hat
  if (hat) {
    ctx.beginPath();
    ctx.moveTo(-size * 0.38, -size * 0.72);
    ctx.lineTo( size * 0.38, -size * 0.72);
    ctx.lineTo( size * 0.38, -size * 0.78);
    ctx.lineTo(-size * 0.38, -size * 0.78);
    ctx.closePath();
    ctx.fillStyle = '#6644BB';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, -size * 1.35);
    ctx.lineTo(-size * 0.32, -size * 0.78);
    ctx.lineTo( size * 0.32, -size * 0.78);
    ctx.closePath();
    ctx.fillStyle = '#6644BB';
    ctx.fill();
    ['#FFD700','#FF69B4','#4488FF'].forEach((c, i) => {
      drawStar5(ctx, (i - 1) * size * 0.18, -size * (0.9 + i * 0.12), size * 0.06, c);
    });
  }

  ctx.restore();
}

function drawStar5(c, x, y, r, color) {
  c.save();
  c.translate(x, y);
  c.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    i === 0 ? c.moveTo(Math.cos(angle) * r, Math.sin(angle) * r)
            : c.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
  }
  c.closePath();
  c.fillStyle = color;
  c.fill();
  c.restore();
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
    const speed = 100 + Math.random() * 150;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 80,
      color,
      r: 5 + Math.random() * 8,
      life: 1,
      decay: 0.8 + Math.random() * 0.5,
    });
  }
}

function updateParticles(dt) {
  particles = particles.filter(p => p.life > 0.02);
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.life -= p.decay * dt;
    p.r *= 0.99;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2, '0');
    ctx.fill();
  });
}

let menuOctaneY = 0;
let menuTimer = 0;
let menuNoteSparkles = [];

// --- Fireworks (victory return to menu) ---
let menuFireworks   = [];   // burst particles
let menuFwShells    = [];   // rising shells
let menuVictory     = false;
let menuVictoryTimer = 0;
let fwLaunchTimer   = 0;
const FW_COLORS = ['#FF4444','#FF8C00','#FFD700','#44DD44','#4488FF','#CC44FF','#FF69B4','#00FFFF'];

function launchFirework(x, y) {
  const color = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
  const count = 55 + Math.floor(Math.random() * 25);
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
    const speed = 100 + Math.random() * 200;
    menuFireworks.push({
      x, y, color,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      size: 2.5 + Math.random() * 2.5,
    });
  }
  // small secondary burst with complementary colour
  const c2 = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 30 + Math.random() * 80;
    menuFireworks.push({
      x, y, color: c2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 0.85,
      size: 1.5 + Math.random() * 1.5,
    });
  }
}

function initMenu() {
  gameState = 'menu';
  hideHUD();
  pianoBar.style.display = 'none';
  btnBack.style.display = 'none';

  octaveColor = 0;
  menuNoteSparkles = [];
  menuFireworks = [];
  menuFwShells  = [];
  fwLaunchTimer = 0;
  if (menuVictory) {
    menuVictoryTimer = 5.5; // fireworks duration in seconds
    // Immediately fire a first volley
    for (let i = 0; i < 4; i++) {
      launchFirework(W * (0.15 + Math.random() * 0.7), H * (0.1 + Math.random() * 0.45));
    }
  } else {
    menuVictoryTimer = 0;
  }
}

const MENU_BUTTONS = [
  { label: '🫧 La Chasse aux Touches', sub: 'Attrape les bulles !',  color1: '#4488FF', color2: '#44CCFF', action: () => startLevel1() },
  { label: '⭐ Le Chant des Étoiles',  sub: 'Écoute et saute !',     color1: '#9944CC', color2: '#FF69B4', action: () => startLevel2() },
  { label: '🎹 Le Grand Concert',      sub: 'Joue la mélodie !',     color1: '#FF6644', color2: '#FFD700', action: () => startLevel3() },
  { label: '🎵 Piano Libre',           sub: 'Joue comme tu veux !',  color1: '#22AA66', color2: '#88FFCC', action: () => startLevel4() },
];

function drawMenu(dt) {
  // Deep cosmic gradient background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,    '#07091f');
  grad.addColorStop(0.5,  '#0d1240');
  grad.addColorStop(1,    '#1a0e3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Soft radial nebula
  const neb = ctx.createRadialGradient(W/2, H*0.45, 50, W/2, H*0.45, W*0.6);
  neb.addColorStop(0, 'rgba(120,80,200,0.15)');
  neb.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = neb;
  ctx.fillRect(0, 0, W, H);

  drawStars(dt);
  menuTimer += dt;

  // ── Fireworks (victory) ──────────────────────────────────────
  if (menuVictoryTimer > 0) {
    menuVictoryTimer -= dt;
    fwLaunchTimer    -= dt;

    // Launch a new burst every ~0.35 s
    if (fwLaunchTimer <= 0) {
      fwLaunchTimer = 0.28 + Math.random() * 0.25;
      launchFirework(W * (0.12 + Math.random() * 0.76), H * (0.08 + Math.random() * 0.48));
    }

    // Update & draw particles
    menuFireworks = menuFireworks.filter(p => p.alpha > 0.015);
    menuFireworks.forEach(p => {
      p.x  += p.vx * dt;
      p.y  += p.vy * dt;
      p.vy += 180 * dt;       // gravity
      p.vx *= Math.pow(0.88, dt * 60 / 60);  // air drag
      p.vy *= Math.pow(0.88, dt * 60 / 60);
      p.alpha -= dt * (0.55 + Math.random() * 0.15);
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle   = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // "BRAVO !" overlay text (fades out in last second)
    const textAlpha = Math.min(1, menuVictoryTimer / 0.8);
    if (menuVictoryTimer > 0.2) {
      const pulse = 1 + Math.sin(menuTimer * 6) * 0.06;
      ctx.save();
      ctx.globalAlpha = Math.min(1, textAlpha);
      ctx.translate(W / 2, H * 0.12);
      ctx.scale(pulse, pulse);
      ctx.font = `900 ${Math.floor(W * 0.082)}px Fredoka, "Comic Sans MS", cursive`;
      ctx.textAlign = 'center';
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur  = 40;
      const tg = ctx.createLinearGradient(0, -50, 0, 20);
      tg.addColorStop(0, '#FFE86B');
      tg.addColorStop(1, '#FF8C00');
      ctx.fillStyle = tg;
      ctx.fillText('🎉 BRAVO ! 🎉', 0, 0);
      ctx.restore();
    }

    if (menuVictoryTimer <= 0) {
      menuFireworks = [];
      menuVictory   = false;
    }
  }

  // Floating note sparkles
  if (Math.random() < dt * 3) {
    menuNoteSparkles.push({
      x: Math.random() * W,
      y: H + 20,
      note: NOTES[Math.floor(Math.random() * 7)],
      vy: -(40 + Math.random() * 60),
      vx: (Math.random() - 0.5) * 30,
      alpha: 1,
      size: 18 + Math.random() * 18,
    });
  }
  menuNoteSparkles = menuNoteSparkles.filter(s => s.alpha > 0.05 && s.y > -50);
  menuNoteSparkles.forEach(s => {
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.alpha -= 0.3 * dt;
    ctx.save();
    ctx.globalAlpha = s.alpha;
    ctx.font = `bold ${s.size}px Fredoka, "Comic Sans MS", cursive`;
    ctx.fillStyle = s.note.color;
    ctx.shadowColor = s.note.color;
    ctx.shadowBlur = 12;
    ctx.fillText(s.note.name, s.x, s.y);
    ctx.restore();
  });

  // Title (with elegant glow)
  ctx.save();
  ctx.shadowColor = 'rgba(255,209,102,0.55)';
  ctx.shadowBlur = 36;
  ctx.font = `700 ${Math.floor(W * 0.052)}px Fredoka, "Comic Sans MS", cursive`;
  ctx.textAlign = 'center';
  const titleGrad = ctx.createLinearGradient(0, H*0.12, 0, H*0.20);
  titleGrad.addColorStop(0, '#FFE9A8');
  titleGrad.addColorStop(1, '#FFB347');
  ctx.fillStyle = titleGrad;
  ctx.fillText("L'Odyssée des Notes Magiques", W / 2, H * 0.16);
  ctx.restore();

  // Subtitle
  ctx.font = `500 ${Math.floor(W * 0.020)}px Fredoka, "Comic Sans MS", cursive`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(220,228,255,0.78)';
  ctx.fillText('Aide Zom & Vlad à retrouver leurs couleurs', W / 2, H * 0.225);

  // Zom (zombie) + Vlad (vampire) bouncing side by side
  const bounce = Math.sin(menuTimer * 2) * 8;
  const bouncV = Math.sin(menuTimer * 2 + 1) * 8;
  drawZombie (W / 2 - 80, H * 0.44 + bounce, 64, true);
  drawVampire(W / 2 + 80, H * 0.44 + bouncV, 64, true);

  // Story (refined)
  ctx.font = `400 ${Math.floor(W * 0.0165)}px Fredoka, "Comic Sans MS", cursive`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(180,190,230,0.65)';
  ctx.fillText('Zom le zombie et Vlad le vampire ont perdu leurs couleurs…', W / 2, H * 0.62);
  ctx.fillStyle = 'rgba(220,228,255,0.85)';
  ctx.font = `500 ${Math.floor(W * 0.019)}px Fredoka, "Comic Sans MS", cursive`;
  ctx.fillText('Choisis un niveau pour commencer', W / 2, H * 0.665);

  // High score badge (niveau 1)
  if (l1HighScore > 0) {
    ctx.save();
    ctx.font = `600 ${Math.floor(W * 0.016)}px Fredoka, "Comic Sans MS", cursive`;
    ctx.textAlign = 'center';
    const text = `Record : ${l1HighScore} bulles`;
    const tw = ctx.measureText(text).width;
    const padX = 16, padY = 7;
    const bx = W / 2 - tw/2 - padX - 14;
    const by = H * 0.71 - 14;
    ctx.beginPath();
    ctx.roundRect(bx, by, tw + 2*padX + 24, 28, 999);
    ctx.fillStyle = 'rgba(255,209,102,0.14)';
    ctx.strokeStyle = 'rgba(255,209,102,0.35)';
    ctx.lineWidth = 1;
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#FFD166';
    ctx.fillText('🏆 ' + text, W / 2, H * 0.71 + 4);
    ctx.restore();
  }

  // Level buttons (works for any number of buttons)
  const n = MENU_BUTTONS.length;
  const gap = Math.min(20, W * 0.018);
  const btnW = Math.min(220, (W * 0.92 - gap * (n - 1)) / n);
  const btnH = 84;
  const totalW = n * btnW + (n - 1) * gap;
  const startX = W / 2 - totalW / 2;
  const btnY = H * 0.78;

  MENU_BUTTONS.forEach((btn, i) => {
    const bx = startX + i * (btnW + gap);
    const cx = bx + btnW / 2;
    const cy = btnY + btnH / 2;
    const pulse = 1 + Math.sin(menuTimer * 2.2 + i * 1.1) * 0.025;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(pulse, pulse);

    // Soft drop shadow
    ctx.beginPath();
    ctx.roundRect(-btnW/2, -btnH/2 + 8, btnW, btnH, 20);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.filter = 'blur(8px)';
    ctx.fill();
    ctx.filter = 'none';

    // Button body — diagonal gradient
    const bg = ctx.createLinearGradient(-btnW/2, -btnH/2, btnW/2, btnH/2);
    bg.addColorStop(0, btn.color1);
    bg.addColorStop(1, btn.color2);
    ctx.beginPath();
    ctx.roundRect(-btnW/2, -btnH/2, btnW, btnH, 20);
    ctx.fillStyle = bg;
    ctx.shadowColor = btn.color1;
    ctx.shadowBlur = 22;
    ctx.shadowOffsetY = 4;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Inner top highlight
    const hl = ctx.createLinearGradient(0, -btnH/2, 0, -btnH/2 + 24);
    hl.addColorStop(0, 'rgba(255,255,255,0.32)');
    hl.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.roundRect(-btnW/2, -btnH/2, btnW, 24, [20, 20, 0, 0]);
    ctx.fillStyle = hl;
    ctx.fill();

    // Subtle border
    ctx.beginPath();
    ctx.roundRect(-btnW/2, -btnH/2, btnW, btnH, 20);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Main label
    ctx.font = `700 ${Math.floor(btnW * 0.10)}px Fredoka, "Comic Sans MS", cursive`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'white';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 1;
    ctx.fillText(btn.label, 0, -10);
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Sub label
    ctx.font = `500 ${Math.floor(btnW * 0.072)}px Fredoka, "Comic Sans MS", cursive`;
    ctx.fillStyle = 'rgba(255,255,255,0.82)';
    ctx.fillText(btn.sub, 0, 18);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  });
}

function menuClick(mx, my) {
  const n = MENU_BUTTONS.length;
  const gap = Math.min(20, W * 0.018);
  const btnW = Math.min(220, (W * 0.92 - gap * (n - 1)) / n);
  const btnH = 84;
  const totalW = n * btnW + (n - 1) * gap;
  const startX = W / 2 - totalW / 2;
  const btnY = H * 0.78;

  MENU_BUTTONS.forEach((btn, i) => {
    const bx = startX + i * (btnW + gap);
    if (mx >= bx && mx <= bx + btnW && my >= btnY && my <= btnY + btnH) {
      btn.action();
    }
  });
}

  score = 0; lives = 3; l1Score = 0; bubbles = [];

// Portée musicale — layout calculé en fonction de W et H
function computeStaffLayout() {
  const topY    = 85;
  const botY    = H - 175;
  const staffMid = topY + (botY - topY) * 0.52;
  const ls      = Math.max(18, Math.min(26, (botY - topY) * 0.062)); // espacement lignes
  const ss      = ls / 2; // demi-pas (espace entre notes adjacentes)
  const mL = 50, mR = 50;
  const colW    = (W - mL - mR) / 7;
  const colX    = Array.from({length: 7}, (_, i) => mL + (i + 0.5) * colW);

  // 5 lignes de la portée (clé de Sol) :
  // Ligne 1=Mi, 2=Sol, 3=Si, 4=Ré(5), 5=Fa(5)
  // staffMid centré sur Si (ligne 3)
  const staffLines = [
    staffMid - 2 * ls,  // Fa(5) - ligne 5
    staffMid - ls,      // Ré(5) - ligne 4
    staffMid,           // Si    - ligne 3
    staffMid + ls,      // Sol   - ligne 2
    staffMid + 2 * ls,  // Mi    - ligne 1
  ];

  // Hauteur Y de chaque note sur la portée (Do→Si, indices 0→6)
  const noteY = [
    staffMid + 3    * ss,  // Do (C4) — interligne sous ligne 1
    staffMid + 2.5  * ss,  // Ré (D4) — sous ligne 1
    staffMid + 2    * ss,  // Mi (E4) — ligne 1
    staffMid + 1.5  * ss,  // Fa (F4) — espace 1
    staffMid + 1    * ss,  // Sol(G4) — ligne 2
    staffMid + 0.5  * ss,  // La (A4) — espace 2
    staffMid,              // Si (B4) — ligne 3
  ];

  return { staffMid, ls, ss, staffLines, colX, noteY, topY, botY };
}

function drawGhostStaff(lay) {
  // Couloirs verticaux (très transparents)
  NOTES.slice(0, 7).forEach((note, i) => {
    ctx.fillStyle = note.color + '0F';
    const hw = lay.colX[1] - lay.colX[0] < 100 ? 38 : 45;
    ctx.fillRect(lay.colX[i] - hw, lay.topY, hw * 2, lay.botY - lay.topY);
  });

  // Lignes horizontales de la portée
  ctx.strokeStyle = 'rgba(200,210,255,0.22)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);
  lay.staffLines.forEach(lineY => {
    ctx.beginPath();
    ctx.moveTo(18, lineY);
    ctx.lineTo(W - 18, lineY);
    ctx.stroke();
  });

  // Interligne/ligère pour Do (en dessous de la portée)
  const doX = lay.colX[0];
  ctx.strokeStyle = 'rgba(200,210,255,0.22)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(doX - 30, lay.noteY[0]);
  ctx.lineTo(doX + 30, lay.noteY[0]);
  ctx.stroke();

  // Petits indicateurs de note en haut de chaque colonne
  NOTES.slice(0, 7).forEach((note, i) => {
    const cx = lay.colX[i];
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.beginPath();
    ctx.arc(cx, lay.topY + 18, 15, 0, Math.PI * 2);
    ctx.fillStyle = note.color;
    ctx.fill();
    ctx.font = 'bold 10px Fredoka, "Comic Sans MS", cursive';
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(note.name, cx, lay.topY + 18);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();

    // Petite tête de note fantôme sur la portée
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.beginPath();
    ctx.ellipse(cx, lay.noteY[i], 10, 7, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = note.color;
    ctx.fill();
    ctx.restore();
  });
}

function spawnBubble() {
  const note = NOTES[Math.floor(Math.random() * 7)];
  const lay  = computeStaffLayout();
  const x    = lay.colX[note.id];
  bubbles.push({
    note, x, y: -40,
    r: 32,
    speed: 85 + Math.random() * 45,
    wobble: Math.random() * Math.PI * 2, // animation visuelle seulement
    hit: false, hitTimer: 0, miss: false,
  });
}

function updateLevel1(dt) {
  if (instrEl.style.display === 'block') return;

  l1BubbleTimer += dt;
  if (l1BubbleTimer >= l1BubbleInterval) {
    l1BubbleTimer = 0;
    l1BubbleInterval = Math.max(1.0, 1.8 - l1Score * 0.04);
    spawnBubble();
  }

  const pianoTop = H - 155;
  bubbles.forEach(b => {
    if (!b.hit && !b.miss) {
      b.y += b.speed * dt;
      b.wobble += dt * 2; // animation visuelle (pulsation) seulement
      if (b.y > pianoTop) {
        b.miss = true;
        lives--;
        updateHUD();
        playError();
        if (lives <= 0) {
          if (l1Score > l1HighScore) {
            l1HighScore = l1Score;
            localStorage.setItem('l1HighScore', l1HighScore);
          }
          menuVictory = false;
          setTimeout(() => transitionTo('menu'), 1800);
          showMessage(`😿 Game over ! Score : ${l1Score}`, 2);
        }
      }
    } else if (b.hit) {
      b.hitTimer += dt;
      b.r += 220 * dt; // expansion rapide — effet pop
      // pas de b.hit = false ici : le filtre ci-dessous gère la suppression
    } else {
      b.hitTimer += dt;
    }
  });

  bubbles = bubbles.filter(b => {
    if (b.hit) return b.hitTimer < 0.22;
    if (b.miss) return b.hitTimer < 0.5;
    return true;
  });
}

function drawLevel1() {
  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H - 150);
  grad.addColorStop(0, '#0a0a2e');
  grad.addColorStop(1, '#0d1545');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H - 150);

  drawStars(0);

  // Portée fantôme
  drawGhostStaff(computeStaffLayout());

  // "Catch line" just above piano
  const lineY = H - 160;
  ctx.setLineDash([12, 8]);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, lineY);
  ctx.lineTo(W, lineY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Zom & Vlad watching from the sides
  const octYL1 = H - 200;
  drawZombie (60,     octYL1, 50, octaveColor < 0.5);
  drawVampire(W - 60, octYL1, 50, octaveColor < 0.5);

  // Progress text
  ctx.font = 'bold 20px Fredoka, "Comic Sans MS", cursive';
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,200,0.7)';
  ctx.fillText(`🫧 ${l1Score} bulles`, 20, H - 165);

  // Draw bubbles
  bubbles.forEach(b => {
    if (b.miss && b.hitTimer > 0.3) return;

    ctx.save();
    ctx.translate(b.x, b.y);
    const alpha = b.hit  ? Math.max(0, 1 - b.hitTimer / 0.22)
                : b.miss ? Math.max(0, 1 - b.hitTimer * 3)
                : 1;

    // Outer glow
    const grad2 = ctx.createRadialGradient(0, 0, b.r * 0.3, 0, 0, b.r);
    grad2.addColorStop(0, b.note.color + 'CC');
    grad2.addColorStop(0.7, b.note.color + '88');
    grad2.addColorStop(1, b.note.color + '22');
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(0, 0, b.r, 0, Math.PI * 2);
    ctx.fillStyle = grad2;
    ctx.fill();

    // Bubble border
    ctx.strokeStyle = b.note.color;
    ctx.lineWidth = 3;
    ctx.shadowColor = b.note.color;
    ctx.shadowBlur = 15;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Shine
    ctx.beginPath();
    ctx.arc(-b.r * 0.25, -b.r * 0.3, b.r * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fill();

    // Note name
    ctx.font = `bold ${b.r * 0.7}px Fredoka, "Comic Sans MS", cursive`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'white';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.note.name, 0, 0);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  });

}

function l1HandleNote(noteId) {
  const hitIdx = bubbles.findIndex(b => !b.hit && !b.miss && b.note.id === noteId);
  if (hitIdx !== -1) {
    const b = bubbles[hitIdx];
    b.hit = true;
    b.hitTimer = 0;
    spawnParticles(b.x, b.y, b.note.color, 16);
    score += 10;
    l1Score++;
    updateHUD();
    flashKey(noteId);
  } else {
    flashKey(noteId);
  }
}

// ============================================================
let l2Platforms = [];
let l2OctX = 0, l2OctY = 0;
let l2TargetX = 0, l2TargetY = 0;
let l2Moving = false;
let l2Expected = -1;
let l2WaitDelay = 0;
let l2ShowingNote = false;
let l2NoteTimer = 0;
let l2FlashPlatform = -1;
let l2FlashTimer = 0;

function startLevel2() {
  gameState = 'level2';
  l2Score = 0; particles = [];
  lives = 8; maxLives = 8;
  updateHUD();
  showHUD('Niveau 2 — Le Chant des Étoiles');
  pianoBar.style.display = 'flex';
  btnBack.style.display = 'block';

  // Arrange 7 platforms in a pleasing layout
  const cols = 4, rows = 2;
  l2Platforms = [];
  const pw = 110, ph = 48;
  const startX = W * 0.15, startY = H * 0.28;
  const gx = (W * 0.72) / (cols - 1);
  const gy = (H * 0.32) / (rows - 1);
  NOTES.forEach((note, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    l2Platforms.push({
      note,
      x: startX + col * gx,
      y: startY + row * gy,
      w: pw, h: ph,
      lit: false,
      litTimer: 0,
    });
  });

  l2OctX = W * 0.1;
  l2OctY = H * 0.28 + 40;
  l2TargetX = l2OctX;
  l2TargetY = l2OctY;
  l2Moving = false;
  l2Expected = -1;
  l2WaitDelay = 1.0;
  l2ShowingNote = false;

  showInstruction(
    '⭐ Le Chant des Étoiles',
    'Le jeu va jouer un son de note.<br>Écoute bien, puis clique sur la plateforme<br>qui porte le <strong>bon nom de note</strong> !<br><br>' +
    'Zom va sauter vers elle si tu as raison ! 🧟',
    '🎵 J\'écoute !',
    () => { l2WaitDelay = 1.0; }
  );
}

function updateLevel2(dt) {
  if (instrEl.style.display === 'block') return;

  // Move Octave toward target
  const dx = l2TargetX - l2OctX;
  const dy = l2TargetY - l2OctY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 4) {
    l2OctX += dx * 8 * dt;
    l2OctY += dy * 8 * dt;
    l2Moving = true;
  } else {
    l2OctX = l2TargetX;
    l2OctY = l2TargetY;
    l2Moving = false;
  }

  // Platform flash
  l2Platforms.forEach(p => {
    if (p.lit) {
      p.litTimer += dt;
      if (p.litTimer > 1.0) { p.lit = false; p.litTimer = 0; }
    }
  });

  // Wait to play next note
  if (!l2ShowingNote && !l2Moving) {
    l2WaitDelay -= dt;
    if (l2WaitDelay <= 0) {
      l2WaitDelay = 2.5;
      // Pick random note — play DO as reference first, then the note
      l2Expected = Math.floor(Math.random() * 7);
      const n = NOTES[l2Expected];
      playNote(NOTES[0].freq, 0.6, 0.3);
      setTimeout(() => playNote(n.freq, 1.0), 700);
      l2ShowingNote = true;
      l2NoteTimer = 0;
    }
  }

  if (l2ShowingNote) {
    l2NoteTimer += dt;
  }
}

function drawLevel2() {
  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0d0d30');
  grad.addColorStop(0.5, '#1a1040');
  grad.addColorStop(1, '#0a0a25');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  drawStars(0);

  // Ground
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(0, H - 155, W, 155);

  // Title hint
  if (l2ShowingNote && l2Expected >= 0) {
    const n = NOTES[l2Expected];
    ctx.save();
    ctx.font = 'bold 32px Fredoka, "Comic Sans MS", cursive';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'white';
    ctx.shadowColor = 'rgba(255,255,255,0.6)';
    ctx.shadowBlur = 20;
    ctx.fillText(`🎵 Quelle note entends-tu ? — ${n.name}`, W / 2, 90);
    ctx.restore();
  } else {
    ctx.font = 'bold 26px Fredoka, "Comic Sans MS", cursive';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(200,200,255,0.5)';
    ctx.fillText('🎵 Écoute la note, puis clique sur la bonne plateforme !', W / 2, 90);
  }

  // Progress
  ctx.font = 'bold 20px Fredoka, "Comic Sans MS", cursive';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,200,0.7)';
  ctx.fillText(`⭐ ${l2Score} / ${L2_TARGET}`, W / 2, H - 170);

  // Draw platforms
  l2Platforms.forEach(p => {
    const glow = p.lit ? (Math.sin(p.litTimer * 10) * 0.5 + 0.5) : 0;
    ctx.save();
    ctx.translate(p.x, p.y);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.roundRect(-p.w/2 + 5, p.h/2 + 5, p.w, 12, 6);
    ctx.fill();

    // Platform body
    const pGrad = ctx.createLinearGradient(0, -p.h/2, 0, p.h/2);
    pGrad.addColorStop(0, p.note.color + 'FF');
    pGrad.addColorStop(1, p.note.color + 'AA');
    ctx.beginPath();
    ctx.roundRect(-p.w/2, -p.h/2, p.w, p.h, 12);
    ctx.fillStyle = pGrad;
    ctx.shadowColor = p.note.color;
    ctx.shadowBlur = 10 + glow * 25;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Note name
    ctx.font = 'bold 24px Fredoka, "Comic Sans MS", cursive';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'white';
    ctx.textBaseline = 'middle';
    ctx.textShadow = '';
    ctx.fillText(p.note.name, 0, 0);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  });

  // Zom jumping on platforms
  const bounceL2 = l2Moving ? Math.sin(Date.now() / 80) * 6 : 0;
  drawZombie(l2OctX, l2OctY + bounceL2, 52, octaveColor < 0.8);

  if (l2Score >= L2_TARGET) {
    menuVictory = true;
    transitionTo('menu');
  }
}

function l2HandleNote(noteId) {
  if (!l2ShowingNote || l2Moving) return;
  if (instrEl.style.display === 'block') return;

  flashKey(noteId);

  if (noteId === l2Expected) {
    // Correct!
    const p = l2Platforms.find(pl => pl.note.id === noteId);
    if (p) {
      l2TargetX = p.x;
      l2TargetY = p.y - 60;
      p.lit = true;
      p.litTimer = 0;
      spawnParticles(p.x, p.y, p.note.color, 14);
    }
    // Voice: pronounce the note name at the matching pitch
    const noteName = NOTES[noteId].name;
    const noteFreq = NOTES[noteId].freq;
    setTimeout(() => {
      if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(noteName);
        utt.lang = 'fr-FR';
        // Map note freq (261→523 Hz) to pitch range (0.6→1.8)
        utt.pitch = 0.6 + (noteFreq - 261.63) / (523.25 - 261.63) * 1.2;
        utt.rate = 0.75;
        utt.volume = 1.0;
        window.speechSynthesis.speak(utt);
      }
    }, 350);
    setTimeout(() => playSuccess(), 1200);
    score += 15;
    l2Score++;
    updateHUD();
    l2ShowingNote = false;
    l2WaitDelay = 1.5;
    if (l2Score >= L2_TARGET) {
      showMessage('🌟 Bravo ! Retour au menu…', 1.8);
    } else {
      showMessage('✅ Parfait !', 0.8);
    }
  } else {
    // Wrong
    lives--;
    updateHUD();
    playError();
    showMessage('❌ Écoute encore…', 1.0);
    if (lives <= 0) {
      menuVictory = false;
      setTimeout(() => initMenu(), 1500);
      showMessage('😿 Aïe ! Retour au début…', 2);
    } else {
      // Replay DO reference then the note
      setTimeout(() => {
        if (l2Expected >= 0) {
          playNote(NOTES[0].freq, 0.6, 0.3);
          setTimeout(() => playNote(NOTES[l2Expected].freq, 1.0), 700);
        }
      }, 600);
    }
  }
}

let l3ElapsedTime = 0;
let l3NoteObjs = [];
let l3HitFeedbacks = [];
let l3FinishTimer = 0;

function startLevel3() {
  stopAllSustainNotes();
  gameState = 'level3';
  lives = 10; maxLives = 10;
  l3Score = 0;
  l3NoteObjs = [];
  l3HitFeedbacks = [];
  l3FinishTimer = 0;
  l3Done = false;
  particles = [];
  activeNoteHighlight = -1;
  updateHUD();
  showHUD('Niveau 3 — Le Grand Concert 🎹');
  pianoBar.style.display = 'flex';
  btnBack.style.display = 'block';

  document.getElementById('progress-bar-container').style.display = 'block';
  document.getElementById('progress-bar').style.width = '0%';

  // Build note objects from MELODY
  // startPx = position à t=0 : la note doit être à HIT_ZONE_X quand l3ElapsedTime = startTime
  // currentX = startPx - l3ElapsedTime * BEAT_SPEED = HIT_ZONE_X + (startTime - l3ElapsedTime) * BEAT_SPEED
  l3ElapsedTime = -LEAD_TIME; // délai avant la première note
  let timeAccum = 0;
  MELODY.forEach((m) => {
    const n = NOTES[m.noteId];
    const startPx = HIT_ZONE_X + timeAccum * BEAT_SPEED;
    const w = Math.max(30, m.beats * BEAT_PX - 8);
    l3NoteObjs.push({
      note: n,
      startPx,
      width: w,
      beats: m.beats,
      startTime: timeAccum,
      hit: false,
      missed: false,
      soundPlayed: false,
      currentX: startPx + LEAD_TIME * BEAT_SPEED, // position initiale correcte dès le 1er frame
    });
    timeAccum += m.beats * BEAT_DUR_L3;
  });

  const totalBeats = MELODY.reduce((s, m) => s + m.beats, 0);
  l3TotalTime = totalBeats * BEAT_DUR_L3 + LEAD_TIME + 3;

  showInstruction(
    '🎹 Le Grand Concert',
    'La chanson "Au Clair de la Lune" va défiler !<br>Quand une note colorée arrive à la <strong>ligne dorée</strong>,<br>appuie sur la bonne touche du piano ! 🎵<br><br>' +
    'Plus tu es précis, plus tu gagnes d\'étoiles !',
    '🎶 Commençons !',
    () => {}
  );
}

let l3TotalTime = 30;

function updateLevel3(dt) {
  if (instrEl.style.display === 'block') return;

  l3ElapsedTime += dt;
  const scrollX = l3ElapsedTime * BEAT_SPEED;

  // Update note x positions
  l3NoteObjs.forEach(n => {
    n.currentX = n.startPx - scrollX;
  });

  // Mark missed notes (passed the hit zone without being hit) — pas de pénalité de vie
  l3NoteObjs.forEach(n => {
    if (!n.hit && !n.missed && n.currentX + n.width < HIT_ZONE_X - 10) {
      n.missed = true;
    }
  });


  // Progress bar (basée sur le temps écoulé hors délai)
  const progress = Math.min(1, (l3ElapsedTime + LEAD_TIME) / l3TotalTime);
  document.getElementById('progress-bar').style.width = (progress * 100) + '%';

  // Check if done
  const allDone = l3NoteObjs.every(n => n.hit || n.missed || n.currentX < -200);
  if (allDone && !l3Done && l3ElapsedTime > 0) {
    l3Done = true;
    l3FinishTimer = 2.5;
  }
  if (l3Done) {
    l3FinishTimer -= dt;
    if (l3FinishTimer <= 0) {
      transitionTo('win');
    }
  }

  // Hit feedbacks
  l3HitFeedbacks = l3HitFeedbacks.filter(f => f.life > 0);
  l3HitFeedbacks.forEach(f => {
    f.life -= dt * 2;
    f.y -= 60 * dt;
  });
}

function drawLevel3() {
  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050520');
  grad.addColorStop(0.6, '#0d0a35');
  grad.addColorStop(1, '#1a0a30');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  drawStars(0);

  const TRACK_Y = H * 0.38;
  const TRACK_H = 80;

  // Track background
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fillRect(0, TRACK_Y - 10, W, TRACK_H + 20);

  // Hit zone line
  ctx.save();
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 4;
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 20;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(HIT_ZONE_X, TRACK_Y - 20);
  ctx.lineTo(HIT_ZONE_X, TRACK_Y + TRACK_H + 20);
  ctx.stroke();
  ctx.restore();

  // Draw scrolling notes
  l3NoteObjs.forEach(n => {
    if (n.currentX > W + 50 || n.currentX + n.width < -50) return;

    const x = n.currentX;
    const y = TRACK_Y;
    const h = TRACK_H;
    const w = n.width;
    const alpha = n.missed ? 0.25 : (n.hit ? Math.max(0, 1 - (l3ElapsedTime - n.hitTime) * 3) : 1);

    ctx.save();
    ctx.globalAlpha = alpha;

    // Note block
    const ng = ctx.createLinearGradient(x, y, x, y + h);
    ng.addColorStop(0, n.note.color + 'EE');
    ng.addColorStop(1, n.note.color + '99');
    ctx.beginPath();
    ctx.roundRect(x, y + 5, w, h - 10, 10);
    ctx.fillStyle = ng;
    ctx.shadowColor = n.note.color;
    ctx.shadowBlur = n.missed ? 0 : 18;
    ctx.fill();

    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Note name
    if (w > 50) {
      ctx.font = `bold ${Math.min(24, w * 0.35)}px Fredoka, "Comic Sans MS", cursive`;
      ctx.textAlign = 'center';
      ctx.fillStyle = 'white';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.note.name, x + w / 2, y + h / 2);
      ctx.textBaseline = 'alphabetic';
    }

    ctx.restore();
  });

  // Hit feedbacks
  l3HitFeedbacks.forEach(f => {
    ctx.save();
    ctx.globalAlpha = f.life;
    ctx.font = 'bold 26px Fredoka, "Comic Sans MS", cursive';
    ctx.textAlign = 'center';
    ctx.fillStyle = f.color;
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 12;
    ctx.fillText('✓', f.x, f.y);
    ctx.restore();
  });

  // Song title
  ctx.save();
  ctx.font = 'bold 28px Fredoka, "Comic Sans MS", cursive';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,215,0,0.8)';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 10;
  ctx.fillText('🎵 Au Clair de la Lune 🎵', W / 2, 55);
  ctx.restore();

  // Compte à rebours pendant le délai
  if (l3ElapsedTime < 0) {
    const countdown = Math.ceil(-l3ElapsedTime);
    const alpha = Math.min(1, (-l3ElapsedTime % 1) + 0.15);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${Math.floor(H * 0.18)}px Fredoka, "Comic Sans MS", cursive`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 40;
    ctx.fillText(countdown, W / 2, H * 0.55);
    ctx.restore();
  }

  // Instruction
  ctx.font = '18px Fredoka, "Comic Sans MS", cursive';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(200,200,255,0.6)';
  ctx.fillText('Appuie sur la bonne touche quand la note arrive à la ligne dorée !', W / 2, 90);

  // Zom & Vlad cheering on the sides
  const jumpAnim = Math.sin(l3ElapsedTime * 4) * 8;
  drawZombie (W - 90, H * 0.62 + jumpAnim, 55, false);
  drawVampire(90,     H * 0.62 - jumpAnim, 55, false);

  // Score big
  ctx.save();
  ctx.font = 'bold 22px Fredoka, "Comic Sans MS", cursive';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,200,0.7)';
  ctx.fillText(`Notes réussies : ${l3Score} / ${MELODY.length}`, W / 2, H - 170);
  ctx.restore();
}

function l3HandleNote(noteId) {
  if (instrEl.style.display === 'block') return;

  flashKey(noteId);
  const note = NOTES[noteId];

  // Find nearest note in hit window
  const hitWindow = 60; // pixels
  let bestNote = null;
  let bestDist = Infinity;

  l3NoteObjs.forEach(n => {
    if (n.hit || n.missed) return;
    const centerX = n.currentX + n.width / 2;
    const dist = Math.abs(centerX - HIT_ZONE_X);
    if (dist < hitWindow + n.width / 2 && dist < bestDist) {
      bestDist = dist;
      bestNote = n;
    }
  });

  if (bestNote && bestNote.note.id === noteId) {
    // Hit!
    bestNote.hit = true;
    bestNote.hitTime = l3ElapsedTime;
    spawnParticles(HIT_ZONE_X, H * 0.38 + 40, note.color, 12);
    l3HitFeedbacks.push({ x: HIT_ZONE_X, y: H * 0.30, color: note.color, life: 1 });
    score += 20;
    l3Score++;
    updateHUD();
  }
}

// ============================================================
// WIN SCREEN
// ============================================================
let winTimer = 0;
let confetti = [];

function initWin() {
  gameState = 'win';
  hideHUD();
  pianoBar.style.display = 'none';
  btnBack.style.display = 'none';
  document.getElementById('progress-bar-container').style.display = 'none';
  winTimer = 0;
  octaveColor = 1;
  confetti = Array.from({ length: 80 }, () => ({
    x: Math.random() * W,
    y: -20 - Math.random() * 100,
    vx: (Math.random() - 0.5) * 80,
    vy: 60 + Math.random() * 100,
    color: NOTES[Math.floor(Math.random() * 7)].color,
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 4,
    w: 10 + Math.random() * 12,
    h: 5 + Math.random() * 6,
  }));

  // Play victory fanfare
  const fanfare = [261.63, 329.63, 392.00, 523.25];
  fanfare.forEach((f, i) => setTimeout(() => playNote(f, 0.8, 0.4), i * 200));
}

function drawWin(dt) {
  winTimer += dt;

  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a1a3e');
  grad.addColorStop(1, '#1a0a3e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  drawStars(dt);

  // Confetti
  confetti.forEach(c => {
    c.x += c.vx * dt;
    c.y += c.vy * dt;
    c.rot += c.rotV * dt;
    if (c.y > H + 20) { c.y = -20; c.x = Math.random() * W; }
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.roundRect(-c.w/2, -c.h/2, c.w, c.h, 3);
    ctx.fill();
    ctx.restore();
  });

  // Title
  const pulse = 1 + Math.sin(winTimer * 3) * 0.04;
  ctx.save();
  ctx.translate(W / 2, H * 0.18);
  ctx.scale(pulse, pulse);
  ctx.font = `bold ${Math.floor(W * 0.07)}px Fredoka, "Comic Sans MS", cursive`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 30;
  ctx.fillText('🎉 BRAVO ! 🎉', 0, 0);
  ctx.shadowBlur = 0;
  ctx.restore();

  ctx.font = `bold ${Math.floor(W * 0.03)}px Fredoka, "Comic Sans MS", cursive`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'white';
  ctx.fillText('Zom & Vlad ont retrouvé toutes leurs couleurs !', W / 2, H * 0.28);

  // Both characters celebrating
  const bounceWin = Math.sin(winTimer * 2.5) * 12;
  drawZombie (W / 2 - 80, H * 0.52 + bounceWin,  80, false, true);
  drawVampire(W / 2 + 80, H * 0.52 - bounceWin,  80, false, false);

  // Stars
  const numStars = Math.min(5, Math.floor(score / 40));
  for (let i = 0; i < 5; i++) {
    const sx = W / 2 + (i - 2) * 60;
    const sy = H * 0.73;
    ctx.save();
    ctx.shadowColor = i < numStars ? '#FFD700' : 'transparent';
    ctx.shadowBlur = 15;
    ctx.font = '40px serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = i < numStars ? '#FFD700' : '#333355';
    ctx.fillText('★', sx, sy);
    ctx.restore();
  }

  ctx.font = 'bold 22px Fredoka, "Comic Sans MS", cursive';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700';
  ctx.fillText(`Score final : ${score} points ⭐`, W / 2, H * 0.79);

  // Note sequence reminder
  const noteColors = [0, 0, 0, 1, 2, 1, 0, 2, 1, 1, 0].map(i => NOTES[i].color);
  ctx.font = '14px Fredoka, "Comic Sans MS", cursive';
  ctx.fillStyle = 'rgba(200,200,255,0.6)';
  ctx.fillText('Tu as joué : Au Clair de la Lune ! 🎵', W / 2, H * 0.84);

  // Replay button
  const bpulse = 1 + Math.sin(winTimer * 4) * 0.05;
  ctx.save();
  ctx.translate(W / 2, H * 0.91);
  ctx.scale(bpulse, bpulse);
  const rGrad = ctx.createLinearGradient(-130, 0, 130, 0);
  rGrad.addColorStop(0, '#4488FF');
  rGrad.addColorStop(1, '#44BBFF');
  ctx.beginPath();
  ctx.roundRect(-130, -28, 260, 56, 28);
  ctx.fillStyle = rGrad;
  ctx.shadowColor = '#4488FF';
  ctx.shadowBlur = 20;
  ctx.fill();
  ctx.font = 'bold 22px Fredoka, "Comic Sans MS", cursive';
  ctx.fillStyle = 'white';
  ctx.shadowBlur = 0;
  ctx.textAlign = 'center';
  ctx.fillText('🔄 Rejouer', 0, 8);
  ctx.restore();
}

function winClick(mx, my) {
  if (Math.abs(mx - W/2) < 140 && Math.abs(my - H * 0.91) < 32) {
    menuVictory = true;
    initMenu();
  }
}

// ============================================================
// TRANSITIONS
// ============================================================
let transitioning = false;
let transitionAlpha = 0;
let transitionTarget = '';
let transitionDir = 1; // 1 = fade in, -1 = fade out

function transitionTo(target) {
  if (transitioning) return;
  transitioning = true;
  transitionDir = 1;
  transitionAlpha = 0;
  transitionTarget = target;
}

function updateTransition(dt) {
  if (!transitioning) return;
  transitionAlpha += transitionDir * 3 * dt;

  if (transitionDir === 1 && transitionAlpha >= 1) {
    transitionAlpha = 1;
    // Switch screens
    switch (transitionTarget) {
      case 'menu':   initMenu();    break;
      case 'level1': startLevel1(); break;
      case 'level2': startLevel2(); break;
      case 'level3': startLevel3(); break;
      case 'level4': startLevel4(); break;
      case 'win':    initWin();     break;
    }
    transitionDir = -1;
  }

  if (transitionDir === -1 && transitionAlpha <= 0) {
    transitionAlpha = 0;
    transitioning = false;
  }
}

// ============================================================
// INPUT
// ============================================================
const keyMap = {};
NOTES.forEach(n => { keyMap[n.key] = n.id; });

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const noteId = keyMap[e.key.toLowerCase()];
  if (noteId !== undefined) {
    startSustainNote(noteId);
    handleNoteInput(noteId);
  }
});

document.addEventListener('keyup', e => {
  const noteId = keyMap[e.key.toLowerCase()];
  if (noteId !== undefined) {
    stopSustainNote(noteId);
  }
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  if (gameState === 'menu') menuClick(mx, my);
  if (gameState === 'win')  winClick(mx, my);
});

function handleNoteInput(noteId) {
  if (gameState === 'level1') l1HandleNote(noteId);
  if (gameState === 'level2') l2HandleNote(noteId);
  if (gameState === 'level3') l3HandleNote(noteId);
  if (gameState === 'level4') l4HandleNote(noteId);
}

// ============================================================
// LEVEL 4: PIANO LIBRE
// ============================================================
let l4LastNote   = null;
let l4NoteTimer  = 0;
let l4MenuTimer  = 0;

function startLevel4() {
  stopAllSustainNotes();
  gameState = 'level4';
  l4LastNote  = null;
  l4NoteTimer = 0;
  l4MenuTimer = 0;
  pianoBar.style.display = 'flex';
  btnBack.style.display  = 'block';
  hudEl.style.display    = 'none';
  document.getElementById('progress-bar-container').style.display = 'none';
}

function l4HandleNote(noteId) {
  l4LastNote  = NOTES[noteId];
  l4NoteTimer = 2.5;
  flashKey(noteId);
}

function updateLevel4(dt) {
  l4MenuTimer += dt;
  if (l4NoteTimer > 0) l4NoteTimer -= dt;
}

function drawLevel4() {
  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a2e');
  grad.addColorStop(1, '#0d1a3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  drawStars(0);

  // Title
  ctx.save();
  ctx.font = `bold ${Math.floor(W * 0.038)}px Fredoka, "Comic Sans MS", cursive`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#88FFCC';
  ctx.shadowColor = '#44FFAA';
  ctx.shadowBlur = 18;
  ctx.fillText('🎵 Piano Libre 🎵', W / 2, H * 0.18);
  ctx.restore();

  ctx.font = `${Math.floor(W * 0.020)}px Fredoka, "Comic Sans MS", cursive`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(200,255,230,0.6)';
  ctx.fillText('Appuie sur les touches et explore les sons !', W / 2, H * 0.26);

  // Zom & Vlad animés
  const bounce1 = Math.sin(l4MenuTimer * 1.8) * 10;
  const bounce2 = Math.sin(l4MenuTimer * 2.1 + 1) * 10;
  drawZombie (W / 2 - 100, H * 0.50 + bounce1, 70, false);
  drawVampire(W / 2 + 100, H * 0.50 + bounce2, 70, false);

  // Affiche la dernière note jouée
  if (l4LastNote && l4NoteTimer > 0) {
    const alpha = Math.min(1, l4NoteTimer);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${Math.floor(W * 0.12)}px Fredoka, "Comic Sans MS", cursive`;
    ctx.textAlign = 'center';
    ctx.fillStyle = l4LastNote.color;
    ctx.shadowColor = l4LastNote.color;
    ctx.shadowBlur = 40;
    ctx.fillText(l4LastNote.name, W / 2, H * 0.46);
    ctx.restore();
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
function updateMessage(dt) {
  if (msgTimer > 0) {
    msgTimer -= dt;
    if (msgTimer <= 0) {
      msgEl.style.display = 'none';
    }
  }
}

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  updateMessage(dt);
  updateTransition(dt);
  updateParticles(dt);

  switch (gameState) {
    case 'menu':   drawMenu(dt); break;
    case 'level1': updateLevel1(dt); drawLevel1(); break;
    case 'level2': updateLevel2(dt); drawLevel2(); break;
    case 'level3': updateLevel3(dt); drawLevel3(); break;
    case 'level4': updateLevel4(dt); drawLevel4(); break;
    case 'win':    drawWin(dt); break;
  }

  drawParticles();

  // Transition overlay
  if (transitioning && transitionAlpha > 0) {
    ctx.fillStyle = `rgba(0,0,0,${transitionAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  requestAnimationFrame(gameLoop);
}

// ============================================================
// INIT
// ============================================================
initMenu();
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(gameLoop); });
</script>
